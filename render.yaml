# render.yaml — v1.0.1
# Dashka German Translator — Production

services:

  # ── Backend (Web Service) ────────────────────────────────────
  - type: web
    name: api-dashka-chat
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # ✅ P1 FIX: явный CORS origin, не '*'
      - key: CORS_ORIGIN
        value: https://dashka-chat.onrender.com

  # ── Frontend (Static Site) ───────────────────────────────────
  - type: static
    name: dashka-chat
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://api-dashka-chat.onrender.com
